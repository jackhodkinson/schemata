name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  pgquery-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_CFLAGS: -DHAVE_STRCHRNUL=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run pg_query smoke tests
        run: make test-pgquery-smoke

  unit-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CGO_CFLAGS: -DHAVE_STRCHRNUL=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run unit tests
        run: go test ./...
      - name: Enforce package dependency direction
        run: make architecture
      - name: Run go vet
        run: go vet ./...

  deadcode:
    runs-on: ubuntu-latest
    env:
      CGO_CFLAGS: -DHAVE_STRCHRNUL=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run dead code checks
        run: make deadcode

  integration-compile-macos:
    runs-on: macos-latest
    env:
      CGO_CFLAGS: -DHAVE_STRCHRNUL=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Compile integration tests on macOS
        run: mkdir -p bin && go test -tags=integration -c -o bin/integration.test ./test/integration

  integration-tests:
    runs-on: ubuntu-latest
    env:
      CGO_CFLAGS: -DHAVE_STRCHRNUL=1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Start Docker Compose
        run: docker compose up -d
      - name: Wait for databases
        run: sleep 5
      - name: Run integration tests
        run: go test -tags=integration -v ./test/integration/...
      - name: Stop Docker Compose
        if: always()
        run: docker compose down
